name: 'PlainPlan - Terraform Plan Review'
description: 'Analyze Terraform plans with AI and post PR-ready summaries as PR comments'
author: 'adamnmcc'

branding:
  icon: 'file-text'
  color: 'green'

inputs:
  plan_file:
    description: 'Path to Terraform plan JSON file (generated via: terraform show -json tfplan > plan.json)'
    required: false
    default: 'plan.json'

  api_key:
    description: >-
      PlainPlan API key (https://plainplan.click). Optional: if omitted, the
      action uses the free tier for PUBLIC repos via GitHub OIDC — which
      requires `permissions: id-token: write` on the job. Private repos must
      set an api_key.
    required: false
    default: ''

  api_url:
    description: 'PlainPlan API endpoint URL (API-key mode). Defaults to production.'
    required: false
    default: 'https://api.plainplan.click/api/analyze'

  free_api_url:
    description: 'PlainPlan free-tier (OIDC) endpoint URL. Defaults to production.'
    required: false
    default: 'https://api.plainplan.click/api/free/analyze'

  oidc_audience:
    description: 'Audience claim requested for the GitHub OIDC token (free tier).'
    required: false
    default: 'plainplan'

  github_token:
    description: 'GitHub token for posting PR comments.'
    required: false
    default: ${{ github.token }}

  post_comment:
    description: 'Whether to post analysis as a PR comment.'
    required: false
    default: 'true'

  fail_on_risk:
    description: >-
      Risk threshold that fails the run and sets the `plainplan` commit status to
      failure: one of none | LOW | MED | HIGH. `none` (default) never fails and is
      fully backward-compatible. Add the `plainplan` status to your branch
      protection required checks to gate merges. Requires `statuses: write`.
    required: false
    default: 'none'

outputs:
  summary:
    description: 'Plain-English summary of the Terraform plan'
    value: ${{ steps.analyze.outputs.summary }}

  risk_level:
    description: 'Highest risk level detected: HIGH, MEDIUM, LOW, or NONE'
    value: ${{ steps.analyze.outputs.risk_level }}

  pr_markdown:
    description: 'Full PR-ready markdown comment content'
    value: ${{ steps.analyze.outputs.pr_markdown }}

runs:
  using: 'composite'
  steps:
    - name: Validate plan file
      shell: bash
      run: |
        if [ ! -f "${{ inputs.plan_file }}" ]; then
          echo "::error::Plan file not found: ${{ inputs.plan_file }}"
          exit 1
        fi
        if ! jq empty "${{ inputs.plan_file }}" 2>/dev/null; then
          echo "::error::Plan file is not valid JSON: ${{ inputs.plan_file }}"
          exit 1
        fi
        RESOURCE_COUNT=$(jq '.resource_changes | length' "${{ inputs.plan_file }}" 2>/dev/null || echo 0)
        echo "✅ Plan file valid — $RESOURCE_COUNT resource changes found"

    - name: Analyze Terraform plan
      id: analyze
      shell: bash
      env:
        PLAINPLAN_API_KEY: ${{ inputs.api_key }}
      run: |
        if [ -n "${PLAINPLAN_API_KEY:-}" ]; then
          echo "🔍 Sending plan to PlainPlan (API key)..."
          ENDPOINT="${{ inputs.api_url }}?include=pr_markdown"
          AUTH_HEADER=(-H "Authorization: Bearer $PLAINPLAN_API_KEY")
        else
          echo "🔍 No API key set — using the free tier for public repositories (GitHub OIDC)..."
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "::error::Free tier requires an OIDC token. Add 'permissions: id-token: write' to the job, or provide an api_key."
            exit 1
          fi
          OIDC_TOKEN=$(curl -s --max-time 15 \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=${{ inputs.oidc_audience }}" | jq -r '.value // empty')
          if [ -z "$OIDC_TOKEN" ]; then
            echo "::error::Could not obtain a GitHub OIDC token (is 'id-token: write' granted?)."
            exit 1
          fi
          ENDPOINT="${{ inputs.free_api_url }}?include=pr_markdown"
          AUTH_HEADER=(-H "X-GitHub-OIDC: $OIDC_TOKEN")
        fi
        HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
          --max-time 60 \
          --connect-timeout 15 \
          -X POST "$ENDPOINT" \
          "${AUTH_HEADER[@]}" \
          -H "Content-Type: application/json" \
          -d @"${{ inputs.plan_file }}" 2>&1) || {
            echo "::error::curl failed — API unreachable or timed out after 60s"
            exit 1
          }
        HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
        HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n 1)
        if [ "$HTTP_STATUS" != "200" ]; then
          echo "::error::PlainPlan API returned HTTP $HTTP_STATUS"
          echo "$HTTP_BODY" | jq -r '.message // .error // empty' 2>/dev/null || true
          exit 1
        fi
        PR_MARKDOWN=$(echo "$HTTP_BODY" | jq -r '.analysis.pr_markdown // empty')
        SUMMARY=$(echo "$HTTP_BODY" | jq -r '.analysis.summary // empty')
        RISK_LEVEL=$(echo "$HTTP_BODY" | jq -r '.metadata.max_risk_level // "NONE"' 2>/dev/null || echo "NONE")
        COMMENT_FILE="$RUNNER_TEMP/plainplan-comment.md"
        echo "$PR_MARKDOWN" > "$COMMENT_FILE"
        echo "comment_file=$COMMENT_FILE" >> $GITHUB_OUTPUT
        echo "summary<<EOF" >> $GITHUB_OUTPUT
        echo "$SUMMARY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        echo "risk_level=$RISK_LEVEL" >> $GITHUB_OUTPUT
        echo "pr_markdown<<EOF" >> $GITHUB_OUTPUT
        echo "$PR_MARKDOWN" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        echo "✅ Analysis complete — risk level: $RISK_LEVEL"

    - name: Post PR comment
      shell: bash
      if: inputs.post_comment == 'true'
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        if [ -z "${{ github.event.pull_request.number }}" ]; then
          echo "::notice::Not running in a PR context — skipping comment."
          cat "${{ steps.analyze.outputs.comment_file }}"
          exit 0
        fi
        gh pr comment "${{ github.event.pull_request.number }}" \
          --body "$(cat "${{ steps.analyze.outputs.comment_file }}")"
        echo "✅ Analysis posted as PR comment"

    - name: Risk gate
      # Runs even if the comment step was skipped, so the `plainplan` commit
      # status is always reported. Requires `statuses: write`.
      if: always() && steps.analyze.outputs.risk_level != ''
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        FAIL_ON=$(echo "${{ inputs.fail_on_risk }}" | tr '[:lower:]' '[:upper:]')
        RISK="${{ steps.analyze.outputs.risk_level }}"
        rank() {
          case "$1" in
            HIGH) echo 3 ;;
            MED|MEDIUM) echo 2 ;;
            LOW) echo 1 ;;
            *) echo 0 ;;
          esac
        }
        RISK_R=$(rank "$RISK")
        FAIL_R=$(rank "$FAIL_ON")

        STATE=success
        if [ "$FAIL_R" -gt 0 ] && [ "$RISK_R" -ge "$FAIL_R" ]; then
          STATE=failure
        fi

        SHA="${{ github.event.pull_request.head.sha }}"
        if [ -n "$SHA" ]; then
          gh api -X POST "repos/${{ github.repository }}/statuses/$SHA" \
            -f state="$STATE" \
            -f context="plainplan" \
            -f description="Risk level: ${RISK:-NONE}" >/dev/null \
            && echo "Set 'plainplan' commit status: $STATE (risk: $RISK)" \
            || echo "::warning::Could not set commit status (need 'statuses: write'?)"
        fi

        if [ "$STATE" = "failure" ]; then
          echo "::error::PlainPlan risk gate failed — risk '$RISK' meets/exceeds threshold '$FAIL_ON'."
          exit 1
        fi
