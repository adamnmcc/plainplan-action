# .github/workflows/terraform-plan-review.yml
name: Terraform Plan Review

on:
  pull_request:
    paths:
      - '**.tf'
      - '**.tfvars'
      - '**.tfvars.json'

jobs:
  terraform-plan-review:
    name: Analyze Terraform Plan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Convert plan to JSON
        run: terraform show -json tfplan > plan.json

      - name: Analyze with PlainPlan
        uses: adamnmcc/plainplan-action@v1
        with:
          plan_file: plan.json
          api_key: ${{ secrets.PLANPLAIN_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Optional: customize the API endpoint (e.g., for self-hosted)
          # api_url: 'https://your-api.example.com/api/analyze'
